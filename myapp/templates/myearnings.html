<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Earnings</title>

    <style>
.total-box{
    width:300px;
    margin:20px auto;
    background:#28a745;
    color:white;
    text-align:center;
    padding:15px;
    border-radius:10px;
    font-size:22px;
    font-weight:bold;
}
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f2f2f2;
            padding:30px;
        }

        h1{
            text-align:center;
            margin-bottom:20px;
        }

        .filter-box,
        .add-box{
            background:white;
            padding:20px;
            border-radius:10px;
            margin-bottom:20px;
            box-shadow:0 0 10px rgba(0,0,0,0.15);
        }

        input{
            width:220px;
            padding:10px;
            margin:8px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            padding:10px 18px;
            background:green;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:darkgreen;
        }

        .total{
            font-size:22px;
            text-align:center;
            margin:20px;
            color:green;
            font-weight:bold;
        }

        .cards{
            display:flex;
            flex-wrap:wrap;
            gap:20px;
            justify-content:center;
        }

        .card{
            width:280px;
            background:white;
            border-radius:12px;
            padding:20px;
            box-shadow:0 0 12px rgba(0,0,0,0.2);
            transition:.3s;
        }

        .card:hover{
            transform:scale(1.03);
        }

        .amount{
            font-size:28px;
            color:green;
            font-weight:bold;
            margin-bottom:10px;
        }

        .reason{
            font-size:18px;
            margin-bottom:10px;
        }

        .date{
            color:gray;
        }

        .empty{
            text-align:center;
            font-size:20px;
            color:red;
            width:100%;
        }

    </style>

</head>
<body>

<h1>💰 My Earnings</h1>

<!-- Filter Form -->
<a href="{% url 'download_pdf' %}">
    <button>Download PDF</button>
</a>
<div class="filter-box">

<form method="GET">

<label>From</label>

<input type="date" name="from_date" value="{{ from_date }}">

<label>To</label>

<input type="date" name="to_date" value="{{ to_date }}">

<button type="submit">Filter</button>

</form>

</div>

<!-- Add Earnings -->

<div class="add-box">

<form method="POST">

{% csrf_token %}

<input type="number"
       name="amount"
       placeholder="Enter Amount"
       required>

<input type="text"
       name="reason"
       placeholder="Reason"
       required>

<button type="submit">
    Add Earning
</button>

</form>

</div>

<!-- Total -->

<div class="total-box">
    <h2>Total Earnings: ₹{{ total_amount }}</h2>
</div>

<!-- Cards -->

<div class="cards">

{% for item in amounts %}

<div class="card">

<div class="amount">

₹ {{ item.amount }}

</div>

<div class="reason">

<b>Reason :</b><br>

{{ item.reason }}

</div>

<div class="date">

<b>Date :</b>

{{ item.created_at|date:"d-m-Y" }}

<br><br>

<b>Time :</b>

{{ item.created_at|date:"h:i A" }}

</div>

</div>

{% empty %}

<p class="empty">

No Earnings Found

</p>

{% endfor %}

</div>

</body>
</html>
