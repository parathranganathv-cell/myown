<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Calendar</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    text-align:center;
    margin:20px;
}

h1{
    margin-bottom:20px;
}

.controls{
    margin-bottom:20px;
}

select{
    padding:8px 10px;
    font-size:16px;
    margin:5px;
}

.calendar{
    width:700px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    width:14.28%;
    height:70px;
    font-size:18px;
}

th{
    background:#2196F3;
    color:white;
}

td:hover{
    background:#e8f4ff;
    cursor:pointer;
}
</style>

</head>
<body>

<h1>English Calendar</h1>

<div class="controls">

<select id="month"></select>

<select id="year"></select>

<button onclick="generateCalendar()">Show Calendar</button>

</div>

<div class="calendar">

<h2 id="title"></h2>

<table>

<thead>

<tr>
<th>Sun</th>
<th>Mon</th>
<th>Tue</th>
<th>Wed</th>
<th>Thu</th>
<th>Fri</th>
<th>Sat</th>
</tr>

</thead>

<tbody id="calendarBody">

</tbody>

</table>

</div>

<script>

const monthSelect=document.getElementById("month");
const yearSelect=document.getElementById("year");

const months=[
"January","February","March","April","May","June",
"July","August","September","October","November","December"
];

// Month Dropdown
months.forEach((month,index)=>{
    let option=document.createElement("option");
    option.value=index;
    option.text=month;
    monthSelect.appendChild(option);
});

// Year Dropdown (1950 - 2100)
for(let y=1950;y<=2100;y++){
    let option=document.createElement("option");
    option.value=y;
    option.text=y;
    yearSelect.appendChild(option);
}

// Default Current Date
const today=new Date();

if(today.getFullYear()>=1950 && today.getFullYear()<=2100){
    yearSelect.value=today.getFullYear();
}
else{
    yearSelect.value=2026;
}

monthSelect.value=today.getMonth();

generateCalendar();

function generateCalendar(){

    let month=parseInt(monthSelect.value);
    let year=parseInt(yearSelect.value);

    document.getElementById("title").innerHTML=
        months[month]+" "+year;

    let firstDay=new Date(year,month,1).getDay();
    let totalDays=new Date(year,month+1,0).getDate();

    let tbody=document.getElementById("calendarBody");
    tbody.innerHTML="";

    let row=document.createElement("tr");

    for(let i=0;i<firstDay;i++){
        row.appendChild(document.createElement("td"));
    }

    for(let day=1;day<=totalDays;day++){

        if((firstDay+day-1)%7===0 && day!==1){
            tbody.appendChild(row);
            row=document.createElement("tr");
        }

        let cell=document.createElement("td");
        cell.innerHTML=day;

        row.appendChild(cell);
    }

    while(row.children.length<7){
        row.appendChild(document.createElement("td"));
    }

    tbody.appendChild(row);

}

</script>

</body>
</html>
